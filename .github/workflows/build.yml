name: The Assembly Line of Despair

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout the Void
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Establish Epistemology
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle Bureaucracy
        uses: gradle/actions/setup-gradle@v3

      - name: Calculate Entropy (a.b.c.d)
        id: version
        run: |
          source version.properties
          a=$MAJOR
          b=$MINOR
          
          d=${{ github.run_number }}
          
          TAG_NAME="v$a.$b"
          
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            git fetch --tags
            c=$(git rev-list ${TAG_NAME}..HEAD --count)
          else
            c=0
          fi
          
          VERSION_NAME="$a.$b.$c.$d"
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$d" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "REVISION_C=$c" >> $GITHUB_ENV
          
          echo "Calculated Vector: $VERSION_NAME"

      - name: Compile the Panopticon
        run: ./gradlew assembleDebug

      - name: Publish the Evidence
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "ReUp ${{ env.TAG_NAME }}"
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk
          body: |
            An automated compilation of your psychological state.
            
            **Vector:** `${{ env.VERSION_NAME }}`
            **Total Builds ($d$):** `${{ env.VERSION_CODE }}`
            **Revisions since structural shift ($c$):** `${{ env.REVISION_C }}`
